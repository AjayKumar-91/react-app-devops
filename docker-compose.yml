services:
  react-app:
    container_name: react-container

    build:
      context: . # current directory
      dockerfile: Dockerfile

    image: ajaykumar91/react-app-dev   # tagging for reuse
    ports:
      - "80:80"

    restart: unless-stopped         # auto restart if crashed

    healthcheck:                    # monitoring ready
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:                        # log control
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"